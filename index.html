<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
    <meta name="theme-color" content="#CC0000" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Taller" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="manifest" href="manifest.json" />
  <!-- iOS icon placeholder (reemplaza con tu ícono real) -->
  <link rel="apple-touch-icon" href="icon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Taller — Sistema de Gestión</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #000; color: #fff; font-family: Arial, Helvetica, sans-serif; }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: #000; }
    ::-webkit-scrollbar-thumb { background: #CC0000; border-radius: 2px; }
    input[type=date]::-webkit-calendar-picker-indicator,
    input[type=month]::-webkit-calendar-picker-indicator { filter: invert(0.4); }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadein { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }
    select option { background: #111; color: #fff; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ── COLORS ─────────────────────────────────────────────────────────────────
const C = {
  black:"#000000", surface:"#0A0A0A", card:"#111111", cardHov:"#161616",
  border:"#1E1E1E", borderRed:"#3A0A0A",
  red:"#CC0000", redBright:"#FF1A1A", redDim:"#7A0000", redGlow:"#CC000033",
  white:"#FFFFFF", gray1:"#AAAAAA", gray2:"#666666", gray3:"#333333",
  green:"#00BB44", yellow:"#DDAA00", blue:"#1A6ECC",
};

function formatCLP(n) { return "$ " + Number(n||0).toLocaleString("es-CL"); }
function formatDate(d) { if (!d) return "—"; return new Date(d+"T00:00:00").toLocaleDateString("es-CL"); }

const TIPO_SERVICIO = ["Pintura Completa","Pintura Parcial","Masilla","Desabolladura","Pulido","Preparación","Otro"];
const CAT_TRABAJO   = ["Bencina","Pintura","Masilla","Materiales","Herramientas","Subcontrato","Otro"];
const CAT_PERSONAL  = ["Comida","Transporte","Servicios","Arriendo","Salud","Otro"];

// ── STORAGE — localStorage con BroadcastChannel para sync entre pestañas ──
const STORE_KEY = "taller_v2_data";

function localLoad() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    const d = raw ? JSON.parse(raw) : {};
    return { trabajos:[], gastos:[], tecnicos:[], ...d };
  } catch { return { trabajos:[], gastos:[], tecnicos:[] }; }
}
function localSave(data) {
  try {
    localStorage.setItem(STORE_KEY, JSON.stringify(data));
    // notify other tabs
    try { new BroadcastChannel(STORE_KEY).postMessage("update"); } catch {}
  } catch {}
}

// ── SVG ICONS ──────────────────────────────────────────────────────────────
const Icon = {
  car:    () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" width="16" height="16"><path d="M5 17H3v-5l2-5h14l2 5v5h-2"/><path d="M5 17a2 2 0 1 0 4 0 2 2 0 0 0-4 0zm10 0a2 2 0 1 0 4 0 2 2 0 0 0-4 0z"/></svg>,
  money:  () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" width="16" height="16"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/><line x1="12" y1="12" x2="12" y2="16"/><line x1="10" y1="14" x2="14" y2="14"/></svg>,
  chart:  () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" width="16" height="16"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/><line x1="2" y1="20" x2="22" y2="20"/></svg>,
  plus:   () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" width="14" height="14"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
  edit:   () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" width="13" height="13"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>,
  trash:  () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" width="13" height="13"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6m4-6v6"/><path d="M9 6V4h6v2"/></svg>,
  close:  () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" width="16" height="16"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
  wrench: () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" width="18" height="18"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>,
  user:   () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" width="13" height="13"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
  phone:  () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" width="13" height="13"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13.5a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 2.69h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 10.09a16 16 0 0 0 6 6l1.46-1.46a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>,
  cal:    () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" width="13" height="13"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>,
  sync:   () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" width="14" height="14"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>,
  id:     () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" width="13" height="13"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>,
  paint:  () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" width="13" height="13"><path d="M19 3H5a2 2 0 0 0-2 2v4a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2z"/><path d="M3 9v9a2 2 0 0 0 2 2h2"/><path d="M21 9v2"/><path d="M12 12v9"/></svg>,
  team:   () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" width="16" height="16"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>,
  pct:    () => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" width="13" height="13"><line x1="19" y1="5" x2="5" y2="19"/><circle cx="6.5" cy="6.5" r="2.5"/><circle cx="17.5" cy="17.5" r="2.5"/></svg>,
};

// ── MICRO COMPONENTS ───────────────────────────────────────────────────────
function Btn({ children, onClick, red }) {
  const [hov, setHov] = useState(false);
  return (
    <button onClick={onClick}
      onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
      style={{ display:"flex", alignItems:"center", gap:6, padding:"8px 16px",
        border: red ? "none" : `1px solid ${C.border}`,
        background: red ? (hov ? C.redBright : C.red) : (hov ? C.border : "transparent"),
        color: red ? C.white : C.gray1,
        cursor:"pointer", fontFamily:"Arial,sans-serif", fontSize:11, fontWeight:700, letterSpacing:1.5, transition:"all 0.15s" }}>
      {children}
    </button>
  );
}
function IcoBtn({ children, color, onClick, title }) {
  const [hov, setHov] = useState(false);
  return (
    <button onClick={onClick} title={title}
      onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
      style={{ background: hov ? color+"33" : "transparent", border:`1px solid ${hov ? color : C.border}`,
        color, width:28, height:28, cursor:"pointer", display:"flex", alignItems:"center",
        justifyContent:"center", transition:"all 0.1s" }}>
      {children}
    </button>
  );
}
function Empty({ icon, msg }) {
  return (
    <div style={{ textAlign:"center", padding:"60px 20px", color:C.gray2 }}>
      <div style={{ opacity:0.25, marginBottom:16, transform:"scale(2.5)", display:"inline-block" }}>{icon}</div>
      <div style={{ fontSize:11, letterSpacing:2, marginTop:8 }}>{msg.toUpperCase()}</div>
    </div>
  );
}
function inputSt() {
  return { background:C.card, border:`1px solid ${C.border}`, padding:"8px 12px",
    color:C.white, fontSize:12, fontFamily:"Arial,sans-serif", outline:"none" };
}
function FSec({ label, children }) {
  return (
    <div>
      <div style={{ fontSize:9, color:C.red, letterSpacing:3, marginBottom:10, fontWeight:700,
        borderBottom:`1px solid ${C.borderRed}`, paddingBottom:6 }}>{label}</div>
      <div style={{ display:"flex", flexDirection:"column", gap:10 }}>{children}</div>
    </div>
  );
}
function FRow({ children }) { return <div style={{ display:"flex", gap:10, flexWrap:"wrap" }}>{children}</div>; }
function FField({ label, val, set, type="text", ph, opts }) {
  const base = { background:"#000", border:`1px solid ${C.border}`, padding:"9px 12px",
    color:C.white, fontSize:13, width:"100%", fontFamily:"Arial,sans-serif", outline:"none" };
  return (
    <div style={{ flex:1, minWidth:130 }}>
      <div style={{ fontSize:9, color:C.gray2, letterSpacing:2, marginBottom:5, fontWeight:700 }}>{label}</div>
      {type === "select"
        ? <select value={val} onChange={e => set(e.target.value)} style={{ ...base }}>
            {ph && <option value="">{ph}</option>}
            {(opts||[]).map(([v,l]) => <option key={v} value={v}>{l}</option>)}
          </select>
        : <input type={type} value={val} onChange={e => set(e.target.value)} placeholder={ph} style={{ ...base }} />
      }
    </div>
  );
}
function ModalShell({ title, children, onClose, onSave, wide }) {
  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.95)", zIndex:100,
      display:"flex", alignItems:"center", justifyContent:"center", padding:16 }}>
      <div style={{ background:C.surface, border:`1px solid ${C.border}`, borderTop:`3px solid ${C.red}`,
        width:"100%", maxWidth: wide?720:480, maxHeight:"92vh", display:"flex", flexDirection:"column",
        animation:"fadein 0.15s ease" }}>
        <div style={{ padding:"16px 22px", borderBottom:`1px solid ${C.border}`,
          display:"flex", justifyContent:"space-between", alignItems:"center" }}>
          <span style={{ fontWeight:700, fontSize:12, letterSpacing:3 }}>{title}</span>
          <button onClick={onClose} style={{ background:"none", border:"none", color:C.gray2, cursor:"pointer", display:"flex" }}><Icon.close /></button>
        </div>
        <div style={{ padding:22, overflow:"auto", flex:1, display:"flex", flexDirection:"column", gap:14 }}>{children}</div>
        <div style={{ padding:"14px 22px", borderTop:`1px solid ${C.border}`, display:"flex", justifyContent:"flex-end", gap:8 }}>
          <button onClick={onClose} style={{ padding:"9px 18px", border:`1px solid ${C.border}`, background:"transparent",
            color:C.gray1, cursor:"pointer", fontFamily:"Arial,sans-serif", fontSize:11, fontWeight:700, letterSpacing:1.5 }}>CANCELAR</button>
          <button onClick={onSave} style={{ padding:"9px 22px", border:"none", background:C.red, color:C.white,
            cursor:"pointer", fontFamily:"Arial,sans-serif", fontSize:11, fontWeight:700, letterSpacing:1.5 }}>GUARDAR</button>
        </div>
      </div>
    </div>
  );
}

// ── MODAL TRABAJO ──────────────────────────────────────────────────────────
function ModalTrabajo({ trabajo, onSave, onClose }) {
  const [f, setF] = useState({
    patente:"", marca:"", modelo:"", anio:"", codigoColor:"",
    tipoServicio:"", nroTrabajo:"", estado:"activo",
    fechaIngreso: new Date().toISOString().split("T")[0], fechaEntrega:"",
    clienteNombre:"", clienteRut:"", clienteTel:"",
    totalCobrar:"", abono:"", descripcion:"",
    ...trabajo,
  });
  const pend = Math.max(0, Number(f.totalCobrar||0) - Number(f.abono||0));
  function submit() {
    if (!f.patente && !f.clienteNombre) { alert("Ingresa al menos la patente o nombre del cliente"); return; }
    onSave({ ...f, pendiente: pend });
  }
  return (
    <ModalShell title={f.id ? "EDITAR ORDEN" : "NUEVA ORDEN DE TRABAJO"} onClose={onClose} onSave={submit} wide>
      <FSec label="VEHÍCULO">
        <FRow>
          <FField label="PATENTE" val={f.patente} set={v => setF(p=>({...p,patente:v.toUpperCase()}))} ph="BBCC12"/>
          <FField label="N° ORDEN" val={f.nroTrabajo} set={v => setF(p=>({...p,nroTrabajo:v}))} ph="T-001"/>
          <FField label="ESTADO" type="select" val={f.estado} set={v => setF(p=>({...p,estado:v}))}
            opts={[["activo","Ingresado"],["proceso","En Proceso"],["listo","Listo"],["entregado","Entregado"]]}/>
        </FRow>
        <FRow>
          <FField label="MARCA" val={f.marca} set={v => setF(p=>({...p,marca:v}))} ph="Toyota"/>
          <FField label="MODELO" val={f.modelo} set={v => setF(p=>({...p,modelo:v}))} ph="Hilux"/>
          <FField label="AÑO" val={f.anio} set={v => setF(p=>({...p,anio:v}))} ph="2020"/>
        </FRow>
        <FRow>
          <FField label="CÓDIGO DE COLOR" val={f.codigoColor} set={v => setF(p=>({...p,codigoColor:v}))} ph="040 / Super White"/>
          <FField label="TIPO DE SERVICIO" type="select" val={f.tipoServicio} set={v => setF(p=>({...p,tipoServicio:v}))}
            opts={TIPO_SERVICIO.map(x=>[x,x])} ph="Seleccionar..."/>
        </FRow>
      </FSec>
      <FSec label="FECHAS">
        <FRow>
          <FField label="FECHA INGRESO" type="date" val={f.fechaIngreso} set={v => setF(p=>({...p,fechaIngreso:v}))}/>
          <FField label="FECHA ENTREGA ESTIMADA" type="date" val={f.fechaEntrega} set={v => setF(p=>({...p,fechaEntrega:v}))}/>
        </FRow>
      </FSec>
      <FSec label="DATOS DEL CLIENTE">
        <FRow>
          <FField label="NOMBRE COMPLETO" val={f.clienteNombre} set={v => setF(p=>({...p,clienteNombre:v}))} ph="Juan Pérez González"/>
          <FField label="RUT" val={f.clienteRut} set={v => setF(p=>({...p,clienteRut:v}))} ph="12.345.678-9"/>
          <FField label="TELÉFONO" val={f.clienteTel} set={v => setF(p=>({...p,clienteTel:v}))} ph="+56 9 1234 5678"/>
        </FRow>
      </FSec>
      <FSec label="COBRO">
        <FRow>
          <FField label="TOTAL A COBRAR ($)" type="number" val={f.totalCobrar} set={v => setF(p=>({...p,totalCobrar:v}))} ph="0"/>
          <FField label="ABONO ($)" type="number" val={f.abono} set={v => setF(p=>({...p,abono:v}))} ph="0"/>
          <div style={{ flex:1 }}>
            <div style={{ fontSize:9, color:C.gray2, letterSpacing:2, marginBottom:6 }}>SALDO PENDIENTE</div>
            <div style={{ padding:"9px 12px", background:"#000", border:`2px solid ${C.yellow}`,
              fontWeight:700, fontSize:20, color:C.yellow }}>{formatCLP(pend)}</div>
          </div>
        </FRow>
        <FField label="OBSERVACIONES" val={f.descripcion} set={v => setF(p=>({...p,descripcion:v}))} ph="Detalles adicionales..."/>
      </FSec>
    </ModalShell>
  );
}

// ── MODAL GASTO ────────────────────────────────────────────────────────────
function ModalGasto({ gasto, onSave, onClose }) {
  const [f, setF] = useState({
    tipo:"trabajo", categoria:"", descripcion:"", monto:"", frecuencia:"diario",
    fecha: new Date().toISOString().split("T")[0],
    ...gasto,
  });
  const cats = f.tipo === "trabajo" ? CAT_TRABAJO : CAT_PERSONAL;
  return (
    <ModalShell title={f.id ? "EDITAR GASTO" : "REGISTRAR GASTO"} onClose={onClose} onSave={() => onSave(f)}>
      <FRow>
        <FField label="TIPO" type="select" val={f.tipo} set={v => setF(p=>({...p,tipo:v,categoria:""}))}
          opts={[["trabajo","Trabajo / Taller"],["personal","Personal"]]}/>
        <FField label="CATEGORÍA" type="select" val={f.categoria} set={v => setF(p=>({...p,categoria:v}))}
          opts={cats.map(x=>[x,x])} ph="Seleccionar..."/>
      </FRow>
      <FRow>
        <FField label="FRECUENCIA" type="select" val={f.frecuencia} set={v => setF(p=>({...p,frecuencia:v}))}
          opts={[["diario","Diario / Puntual"],["mensual","Mensual / Fijo"]]}/>
        <FField label="FECHA" type="date" val={f.fecha} set={v => setF(p=>({...p,fecha:v}))}/>
        <FField label="MONTO ($)" type="number" val={f.monto} set={v => setF(p=>({...p,monto:v}))} ph="0"/>
      </FRow>
      <FField label="DESCRIPCIÓN" val={f.descripcion} set={v => setF(p=>({...p,descripcion:v}))} ph="Ej: Bencina retiro de repuestos..."/>
    </ModalShell>
  );
}

// ── MODAL TÉCNICO ──────────────────────────────────────────────────────────
function ModalTecnico({ tecnico, trabajos, onSave, onClose }) {
  const [f, setF] = useState({ nombre:"", especialidad:"", telefono:"", asignaciones:[], ...tecnico });
  function addAsig() { setF(p=>({...p, asignaciones:[...(p.asignaciones||[]), {trabajoId:"",descripcionTrabajo:"",porcentaje:""}]})); }
  function updAsig(i, k, v) { setF(p=>{ const a=[...(p.asignaciones||[])]; a[i]={...a[i],[k]:v}; return {...p,asignaciones:a}; }); }
  function delAsig(i) { setF(p=>({...p, asignaciones:(p.asignaciones||[]).filter((_,j)=>j!==i)})); }
  function calcMonto(a) {
    const tj = trabajos.find(t=>t.id===a.trabajoId);
    if (!tj) return 0;
    return (Number(tj.totalCobrar||0)*Number(a.porcentaje||0))/100;
  }
  const totalTec = (f.asignaciones||[]).reduce((s,a)=>s+calcMonto(a),0);
  function submit() {
    if (!f.nombre.trim()) { alert("Ingresa el nombre del técnico"); return; }
    onSave(f);
  }
  return (
    <ModalShell title={f.id ? "EDITAR TÉCNICO" : "NUEVO TÉCNICO"} onClose={onClose} onSave={submit} wide>
      <FSec label="DATOS DEL TÉCNICO">
        <FRow>
          <FField label="NOMBRE COMPLETO" val={f.nombre} set={v=>setF(p=>({...p,nombre:v}))} ph="Juan González"/>
          <FField label="ESPECIALIDAD" val={f.especialidad} set={v=>setF(p=>({...p,especialidad:v}))} ph="Pintura / Masilla..."/>
          <FField label="TELÉFONO" val={f.telefono} set={v=>setF(p=>({...p,telefono:v}))} ph="+56 9 1234 5678"/>
        </FRow>
      </FSec>
      <FSec label="TRABAJOS ASIGNADOS">
        {(f.asignaciones||[]).length === 0
          ? <div style={{ padding:14, background:"#000", border:`1px dashed ${C.border}`,
              textAlign:"center", fontSize:12, color:C.gray2 }}>Sin trabajos — presiona el botón para agregar</div>
          : (f.asignaciones||[]).map((a,i) => {
              const tj = trabajos.find(t=>t.id===a.trabajoId);
              const m = calcMonto(a);
              return (
                <div key={i} style={{ background:"#000", border:`1px solid ${C.border}`, padding:14, position:"relative" }}>
                  <div style={{ position:"absolute", top:8, right:8 }}>
                    <IcoBtn color={C.red} onClick={()=>delAsig(i)}><Icon.trash/></IcoBtn>
                  </div>
                  <FRow>
                    <div style={{ flex:2, minWidth:160 }}>
                      <div style={{ fontSize:9, color:C.gray2, letterSpacing:2, marginBottom:5, fontWeight:700 }}>ORDEN DE TRABAJO</div>
                      <select value={a.trabajoId} onChange={e=>updAsig(i,"trabajoId",e.target.value)}
                        style={{ background:C.surface, border:`1px solid ${C.border}`, padding:"9px 12px",
                          color:C.white, fontSize:13, width:"100%", fontFamily:"Arial,sans-serif", outline:"none" }}>
                        <option value="">Seleccionar trabajo...</option>
                        {trabajos.map(t=>(
                          <option key={t.id} value={t.id}>
                            {t.nroTrabajo?`${t.nroTrabajo} — `:""}

  const valid = items.filter(([,,v])=>v);

// ── MAIN APP ───────────────────────────────────────────────────────────────
function App() {
  const [tab, setTab] = useState("trabajos");
  const [data, setData] = useState(() => localLoad());
  const [modalTrabajo, setModalTrabajo] = useState(null);
  const [modalGasto, setModalGasto] = useState(null);
  const [modalTecnico, setModalTecnico] = useState(null);
  const [verTrabajo, setVerTrabajo] = useState(null);
  const [filtroMes, setFiltroMes] = useState(() => {
    const n = new Date();
    return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,"0")}`;
  });

  // Sync entre pestañas del mismo navegador
  useEffect(() => {
    let bc;
    try {
      bc = new BroadcastChannel(STORE_KEY);
      bc.onmessage = () => setData(localLoad());
    } catch {}
    const onStorage = () => setData(localLoad());
    window.addEventListener("storage", onStorage);
    return () => { if (bc) bc.close(); window.removeEventListener("storage", onStorage); };
  }, []);

  function updateData(d) { setData(d); localSave(d); }

  function saveTrabajo(t) {
    const newD = t.id
      ? { ...data, trabajos: data.trabajos.map(x=>x.id===t.id?t:x) }
      : { ...data, trabajos: [{ ...t, id: Date.now().toString() }, ...data.trabajos] };
    updateData(newD); setModalTrabajo(null);
  }
  function deleteTrabajo(id) {
    if (!confirm("¿Eliminar este trabajo?")) return;
    updateData({ ...data, trabajos: data.trabajos.filter(x=>x.id!==id) });
    setVerTrabajo(null);
  }
  function saveGasto(g) {
    const newD = g.id
      ? { ...data, gastos: data.gastos.map(x=>x.id===g.id?g:x) }
      : { ...data, gastos: [{ ...g, id: Date.now().toString() }, ...data.gastos] };
    updateData(newD); setModalGasto(null);
  }
  function deleteGasto(id) {
    if (!confirm("¿Eliminar este gasto?")) return;
    updateData({ ...data, gastos: data.gastos.filter(x=>x.id!==id) });
  }
  function saveTecnico(tc) {
    const newD = tc.id
      ? { ...data, tecnicos: data.tecnicos.map(x=>x.id===tc.id?tc:x) }
      : { ...data, tecnicos: [{ ...tc, id: Date.now().toString() }, ...data.tecnicos] };
    updateData(newD); setModalTecnico(null);
  }
  function deleteTecnico(id) {
    if (!confirm("¿Eliminar este técnico?")) return;
    updateData({ ...data, tecnicos: data.tecnicos.filter(x=>x.id!==id) });
  }

  const gastosMes  = data.gastos.filter(g=>g.fecha?.startsWith(filtroMes));
  const gTrabajo   = gastosMes.filter(g=>g.tipo==="trabajo");
  const gPersonal  = gastosMes.filter(g=>g.tipo==="personal");
  const activos    = data.trabajos.filter(t=>t.estado!=="entregado");
  const entregados = data.trabajos.filter(t=>t.estado==="entregado");
  const pendTotal  = data.trabajos.reduce((a,t)=>a+Number(t.pendiente||0),0);

  function calcTotalTecnico(tc) {
    return (tc.asignaciones||[]).reduce((sum,a)=>{
      const tj = data.trabajos.find(t=>t.id===a.trabajoId);
      if (!tj) return sum;
      return sum+(Number(tj.totalCobrar||0)*Number(a.porcentaje||0))/100;
    },0);

    ["resumen",  <Icon.chart/>, "RESUMEN"],

                  <div style={{ fontSize:11, color:C.gray2, marginTop:6 }}>{k.sub}</div>
                </div>
              ))}
            </div>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
              <div style={{ display:"flex", alignItems:"center", gap:12 }}>
                <div style={{ width:3, height:20, background:C.red }}/>
                <span style={{ fontWeight:700, fontSize:13, letterSpacing:2 }}>ÓRDENES DE TRABAJO</span>
              </div>
              <Btn red onClick={()=>setModalTrabajo({})}><Icon.plus/> NUEVO TRABAJO</Btn>
            </div>
            {data.trabajos.length === 0
              ? <Empty icon={<Icon.car/>} msg="No hay trabajos registrados"/>
              : <div style={{ display:"flex", flexDirection:"column", gap:2 }}>
                  {data.trabajos.map(t => {
                    const ESTADO = { activo:["INGRESADO",C.red], proceso:["EN PROCESO",C.yellow], listo:["LISTO",C.green], entregado:["ENTREGADO",C.gray2] };
                    const [lbl, col] = ESTADO[t.estado]||["—",C.gray2];
                    return (
                      <div key={t.id} style={{ background:C.card, borderLeft:`3px solid ${col}`,
                        display:"flex", alignItems:"stretch", border:`1px solid ${C.border}` }}>
                        <div onClick={()=>setVerTrabajo(t)} style={{ width:100, padding:"14px 16px",
                          borderRight:`1px solid ${C.border}`, flexShrink:0, cursor:"pointer" }}>
                          <div style={{ fontSize:14, fontWeight:700, letterSpacing:2 }}>{t.patente||"—"}</div>
                          <div style={{ fontSize:10, color:C.gray2, marginTop:2 }}>N° {t.nroTrabajo||"—"}</div>
                        </div>
                        <div onClick={()=>setVerTrabajo(t)} style={{ flex:1, padding:"14px 16px",
                          borderRight:`1px solid ${C.border}`, cursor:"pointer" }}>
                          <div style={{ fontSize:13, fontWeight:600 }}>{[t.marca,t.modelo,t.anio].filter(Boolean).join(" ")||"Sin datos"}</div>
                          {t.codigoColor && <div style={{ fontSize:11, color:C.gray2, marginTop:2 }}>Color: {t.codigoColor}</div>}
                          {t.tipoServicio && <div style={{ fontSize:11, color:C.gray2 }}>{t.tipoServicio}</div>}
                        </div>
                        <div onClick={()=>setVerTrabajo(t)} style={{ flex:1, padding:"14px 16px",
                          borderRight:`1px solid ${C.border}`, cursor:"pointer" }}>
                          <div style={{ fontSize:13, fontWeight:600 }}>{t.clienteNombre||"Sin nombre"}</div>
                          <div style={{ fontSize:11, color:C.gray2, marginTop:2 }}>{t.clienteTel||""}</div>
                        </div>
                        <div onClick={()=>setVerTrabajo(t)} style={{ width:120, padding:"14px 14px",
                          borderRight:`1px solid ${C.border}`, flexShrink:0, cursor:"pointer" }}>
                          <div style={{ fontSize:9, color:C.gray2, letterSpacing:1 }}>ENTREGA EST.</div>
                          <div style={{ fontSize:12, marginTop:1, color:C.yellow }}>{formatDate(t.fechaEntrega)}</div>
                        </div>
                        <div onClick={()=>setVerTrabajo(t)} style={{ width:140, padding:"14px 14px",
                          borderRight:`1px solid ${C.border}`, flexShrink:0, textAlign:"right", cursor:"pointer" }}>
                          <div style={{ fontSize:9, color:C.gray2, letterSpacing:1 }}>PENDIENTE</div>
                          <div style={{ fontSize:15, fontWeight:700, color:C.yellow, marginTop:2 }}>{formatCLP(t.pendiente)}</div>
                          {Number(t.abono)>0 && <div style={{ fontSize:10, color:C.green, marginTop:2 }}>Abono: {formatCLP(t.abono)}</div>}
                        </div>
                        <div style={{ width:130, padding:"14px 14px", flexShrink:0,
                          display:"flex", flexDirection:"column", alignItems:"flex-end", gap:8 }}>
                          <span style={{ fontSize:9, fontWeight:700, letterSpacing:1.5, color:col,
                            border:`1px solid ${col}`, padding:"3px 8px" }}>{lbl}</span>
                          <div style={{ display:"flex", gap:4 }}>
                            <IcoBtn color={C.gray1} onClick={()=>setModalTrabajo(t)}><Icon.edit/></IcoBtn>
                            <IcoBtn color={C.red} onClick={()=>deleteTrabajo(t.id)}><Icon.trash/></IcoBtn>
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
            }
          </div>
        )}

        {/* ══ GASTOS ══ */}
        {tab === "gastos" && (
          <div>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center",
              marginBottom:20, flexWrap:"wrap", gap:12 }}>
              <div style={{ display:"flex", alignItems:"center", gap:12 }}>
                <div style={{ width:3, height:20, background:C.red }}/>
                <span style={{ fontWeight:700, fontSize:13, letterSpacing:2 }}>REGISTRO DE GASTOS</span>
              </div>
              <div style={{ display:"flex", gap:10, alignItems:"center" }}>
                <input type="month" value={filtroMes} onChange={e=>setFiltroMes(e.target.value)} style={inputSt()}/>
                <Btn red onClick={()=>setModalGasto({})}><Icon.plus/> AGREGAR GASTO</Btn>
              </div>
            </div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:2, marginBottom:20 }}>
              {[
                { label:"GASTOS DE TRABAJO", val:gTrabajo.reduce((a,g)=>a+Number(g.monto||0),0), n:gTrabajo.length, color:C.red },
                { label:"GASTOS PERSONALES", val:gPersonal.reduce((a,g)=>a+Number(g.monto||0),0), n:gPersonal.length, color:C.blue },
              ].map((k,i)=>(
                <div key={i} style={{ background:C.card, padding:"18px 22px", borderLeft:`3px solid ${k.color}` }}>
                  <div style={{ fontSize:9, color:C.gray2, letterSpacing:2 }}>{k.label}</div>
                  <div style={{ fontSize:26, fontWeight:700, color:k.color, marginTop:4 }}>{formatCLP(k.val)}</div>
                  <div style={{ fontSize:11, color:C.gray2, marginTop:4 }}>{k.n} registro{k.n!==1?"s":""} este mes</div>
                </div>
              ))}
            </div>
            <GastoTable title="GASTOS DE TRABAJO" gastos={gTrabajo} color={C.red} onEdit={setModalGasto} onDelete={deleteGasto}/>
            <div style={{ height:12 }}/>
            <GastoTable title="GASTOS PERSONALES" gastos={gPersonal} color={C.blue} onEdit={setModalGasto} onDelete={deleteGasto}/>
          </div>
        )}

        {/* ══ TÉCNICOS ══ */}
        {tab === "tecnicos" && (
          <div>
            <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:2, marginBottom:28, border:`1px solid ${C.border}` }}>
              {[
                { label:"TÉCNICOS REGISTRADOS", val:data.tecnicos.length, color:C.red, sub:"en el sistema" },
                { label:"TRABAJOS ASIGNADOS", val:data.tecnicos.reduce((s,tc)=>s+(tc.asignaciones||[]).length,0), color:C.gray1, sub:"asignaciones totales" },
                { label:"TOTAL A PAGAR", val:formatCLP(data.tecnicos.reduce((s,tc)=>s+calcTotalTecnico(tc),0)), color:C.yellow, sub:"suma de comisiones" },
              ].map((k,i)=>(
                <div key={i} style={{ background:C.card, padding:"20px 24px", borderLeft:i===0?`3px solid ${C.red}`:"none" }}>
                  <div style={{ fontSize:9, color:C.gray2, letterSpacing:2, marginBottom:6 }}>{k.label}</div>
                  <div style={{ fontSize:32, fontWeight:700, color:k.color, lineHeight:1 }}>{k.val}</div>
                  <div style={{ fontSize:11, color:C.gray2, marginTop:6 }}>{k.sub}</div>
                </div>
              ))}
            </div>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
              <div style={{ display:"flex", alignItems:"center", gap:12 }}>
                <div style={{ width:3, height:20, background:C.red }}/>
                <span style={{ fontWeight:700, fontSize:13, letterSpacing:2 }}>REGISTRO DE TÉCNICOS</span>
              </div>
              <Btn red onClick={()=>setModalTecnico({})}><Icon.plus/> NUEVO TÉCNICO</Btn>
            </div>
            {data.tecnicos.length === 0
              ? <Empty icon={<Icon.team/>} msg="No hay técnicos registrados"/>
              : <div style={{ display:"flex", flexDirection:"column", gap:2 }}>
                  {data.tecnicos.map(tc=>(
                    <TecnicoCard key={tc.id} tc={tc} trabajos={data.trabajos}
                      total={calcTotalTecnico(tc)}
                      onEdit={()=>setModalTecnico(tc)}
                      onDelete={()=>deleteTecnico(tc.id)}/>
                  ))}
                </div>
            }
          </div>
        )}

        {/* ══ RESUMEN ══ */}
        {tab === "resumen" && (() => {
          const gMes = data.gastos.filter(g=>g.fecha?.startsWith(filtroMes));
          const totT = gMes.filter(g=>g.tipo==="trabajo").reduce((a,g)=>a+Number(g.monto||0),0);
          const totP = gMes.filter(g=>g.tipo==="personal").reduce((a,g)=>a+Number(g.monto||0),0);
          const totalFac = data.trabajos.reduce((a,t)=>a+Number(t.totalCobrar||0),0);
          const abonoFac = data.trabajos.reduce((a,t)=>a+Number(t.abono||0),0);
          const pendFac  = data.trabajos.reduce((a,t)=>a+Number(t.pendiente||0),0);
          const catT = {}; gMes.filter(g=>g.tipo==="trabajo").forEach(g=>catT[g.categoria]=(catT[g.categoria]||0)+Number(g.monto||0));
          const catP = {}; gMes.filter(g=>g.tipo==="personal").forEach(g=>catP[g.categoria]=(catP[g.categoria]||0)+Number(g.monto||0));
          const totalCom = data.tecnicos.reduce((s,tc)=>s+calcTotalTecnico(tc),0);

          return (
            <div style={{ display:"flex", flexDirection:"column", gap:20 }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                <div style={{ display:"flex", alignItems:"center", gap:12 }}>
                  <div style={{ width:3, height:20, background:C.red }}/>
                  <span style={{ fontWeight:700, fontSize:13, letterSpacing:2 }}>RESUMEN FINANCIERO</span>
                </div>
                <input type="month" value={filtroMes} onChange={e=>setFiltroMes(e.target.value)} style={inputSt()}/>
              </div>

              {/* Facturación */}
              <div style={{ background:C.card, borderLeft:`3px solid ${C.red}`, padding:"20px 24px" }}>
                <div style={{ fontSize:9, color:C.gray2, letterSpacing:2, marginBottom:16 }}>FACTURACIÓN GLOBAL — TODOS LOS PERÍODOS</div>
                <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:20 }}>
                  {[["TOTAL COTIZADO",totalFac,C.gray1],["ABONADO",abonoFac,C.green],["PENDIENTE",pendFac,C.yellow]].map(([l,v,c])=>(
                    <div key={l}>
                      <div style={{ fontSize:9, color:C.gray2, letterSpacing:2 }}>{l}</div>
                      <div style={{ fontSize:28, fontWeight:700, color:c, marginTop:4 }}>{formatCLP(v)}</div>
                    </div>
                  ))}
                </div>
              </div>

              {/* Gastos */}
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:16 }}>
                <CatPanel title="GASTOS DE TRABAJO" cats={catT} total={totT} color={C.red}/>
                <CatPanel title="GASTOS PERSONALES" cats={catP} total={totP} color={C.blue}/>
              </div>

              {/* Técnicos */}
              <div>
                <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:12 }}>
                  <div style={{ width:3, height:20, background:C.red }}/>
                  <span style={{ fontWeight:700, fontSize:13, letterSpacing:2 }}>COMISIONES DE TÉCNICOS</span>
                </div>
                <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:2, marginBottom:12, border:`1px solid ${C.border}` }}>
                  {[
                    { label:"TÉCNICOS", val:data.tecnicos.length, color:C.red },
                    { label:"TRABAJOS ASIGNADOS", val:data.tecnicos.reduce((s,tc)=>s+(tc.asignaciones||[]).length,0), color:C.gray1 },
                    { label:"TOTAL COMISIONES", val:formatCLP(totalCom), color:C.yellow },
                  ].map((k,i)=>(
                    <div key={i} style={{ background:C.card, padding:"16px 20px", borderLeft:i===0?`3px solid ${C.red}`:"none" }}>
                      <div style={{ fontSize:9, color:C.gray2, letterSpacing:2, marginBottom:4 }}>{k.label}</div>
                      <div style={{ fontSize:24, fontWeight:700, color:k.color }}>{k.val}</div>
                    </div>
                  ))}
                </div>
                {data.tecnicos.length === 0
                  ? <div style={{ background:C.card, border:`1px solid ${C.border}`, padding:24,
                      textAlign:"center", color:C.gray2, fontSize:12 }}>Sin técnicos registrados</div>
                  : <div style={{ border:`1px solid ${C.border}` }}>
                      <div style={{ display:"grid", gridTemplateColumns:"2fr 1fr 1fr 1fr",
                        background:C.surface, padding:"8px 18px", borderBottom:`1px solid ${C.border}` }}>
                        {["TÉCNICO / ESPECIALIDAD","TRABAJOS","% PROM.","TOTAL A PAGAR"].map(h=>(
                          <div key={h} style={{ fontSize:9, color:C.gray2, letterSpacing:1.5, fontWeight:700 }}>{h}</div>
                        ))}
                      </div>
                      {data.tecnicos.map(tc=>{
                        const tot = calcTotalTecnico(tc);
                        const asis = tc.asignaciones||[];
                        const prom = asis.length>0 ? (asis.reduce((s,a)=>s+Number(a.porcentaje||0),0)/asis.length).toFixed(1) : "—";
                        return (
                          <div key={tc.id}>
                            <div style={{ display:"grid", gridTemplateColumns:"2fr 1fr 1fr 1fr",
                              padding:"12px 18px", borderBottom:`1px solid ${C.border}`, alignItems:"center" }}>
                              <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                                <div style={{ width:30, height:30, background:C.red, display:"flex",
                                  alignItems:"center", justifyContent:"center", flexShrink:0,
                                  fontSize:13, fontWeight:700, color:C.white }}>
                                  {(tc.nombre||"?")[0].toUpperCase()}
                                </div>
                                <div>
                                  <div style={{ fontSize:13, fontWeight:700 }}>{tc.nombre}</div>
                                  <div style={{ fontSize:10, color:C.gray2 }}>{tc.especialidad||"—"}</div>
                                </div>
                              </div>
                              <div style={{ fontSize:18, fontWeight:700, color:C.gray1 }}>{asis.length}</div>
                              <div><span style={{ background:C.red+"22", color:C.red,
                                border:`1px solid ${C.red}44`, padding:"2px 8px", fontSize:11, fontWeight:700 }}>
                                {prom}{prom!=="—"?"%":""}</span></div>
                              <div style={{ fontSize:16, fontWeight:700, color:C.yellow }}>{formatCLP(tot)}</div>
                            </div>
                            {asis.map((a,i)=>{
                              const tj = data.trabajos.find(t=>t.id===a.trabajoId);
                              if (!tj) return null;
                              const m = (Number(tj.totalCobrar||0)*Number(a.porcentaje||0))/100;
                              return (
                                <div key={i} style={{ display:"grid", gridTemplateColumns:"2fr 1fr 1fr 1fr",
                                  padding:"7px 18px 7px 58px", background:C.surface,
                                  borderBottom:`1px solid ${C.border}`, alignItems:"center" }}>
                                  <div>
                                    <span style={{ fontSize:10, fontWeight:700, letterSpacing:1, color:C.gray2 }}>{tj.nroTrabajo||tj.patente||"—"}</span>
                                    <span style={{ fontSize:10, color:C.gray2, marginLeft:8 }}>{a.descripcionTrabajo||tj.tipoServicio||"—"}</span>
                                    <div style={{ fontSize:9, color:C.gray3, marginTop:1 }}>{[tj.marca,tj.modelo].filter(Boolean).join(" ")} · {tj.clienteNombre}</div>
                                  </div>
                                  <div style={{ fontSize:10, color:C.gray2 }}>{tj.patente}</div>
                                  <div style={{ fontSize:10, color:C.red, fontWeight:700 }}>{a.porcentaje}%</div>
                                  <div style={{ fontSize:12, fontWeight:700, color:C.yellow }}>{formatCLP(m)}</div>
                                </div>
                              );
                            })}
                          </div>
                        );
                      })}
                      <div style={{ display:"flex", justifyContent:"flex-end", alignItems:"center",
                        gap:20, padding:"12px 18px", background:C.card, borderTop:`2px solid ${C.border}` }}>
                        <span style={{ fontSize:9, color:C.gray2, letterSpacing:2 }}>TOTAL GENERAL COMISIONES</span>
                        <span style={{ fontSize:22, fontWeight:700, color:C.yellow }}>{formatCLP(totalCom)}</span>
                      </div>
                    </div>
                }
              </div>
            </div>
          );
        })()}

      </main>

      {modalTrabajo !== null && <ModalTrabajo trabajo={modalTrabajo} onSave={saveTrabajo} onClose={()=>setModalTrabajo(null)}/>}
      {modalGasto   !== null && <ModalGasto gasto={modalGasto} onSave={saveGasto} onClose={()=>setModalGasto(null)}/>}
      {modalTecnico !== null && <ModalTecnico tecnico={modalTecnico} trabajos={data.trabajos} onSave={saveTecnico} onClose={()=>setModalTecnico(null)}/>}
      {verTrabajo   !== null && <DetalleTrabajo t={verTrabajo} onClose={()=>setVerTrabajo(null)}
        onEdit={()=>{ setModalTrabajo(verTrabajo); setVerTrabajo(null); }}
        onDelete={()=>deleteTrabajo(verTrabajo.id)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
